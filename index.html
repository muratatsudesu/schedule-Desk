<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>木質調 スケジュール管理</title>
  <style>
    * { box-sizing: border-box; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; }
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      background-color: #f6f4f0;
      color: #3e3332;
      letter-spacing: 0.02em;
    }
    
    /* 洗練されたヘッダー */
    .header-banner {
      background: linear-gradient(135deg, #7a5c43 0%, #543c29 100%);
      color: #faf8f5;
      padding: 22px 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(84, 60, 41, 0.15);
      margin-bottom: 20px;
    }
    .header-banner h1 { margin: 0; font-size: 1.25rem; letter-spacing: 0.15em; font-weight: 500; text-transform: uppercase; }
    
    /* 洗練されたカードデザイン */
    .card {
      background: #ffffff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(62, 51, 50, 0.04);
      border: 1px solid #e5dfd5;
      margin-bottom: 20px;
    }
    
    .form-group { margin-bottom: 14px; }
    .form-row { display: flex; gap: 12px; }
    .form-row > div { flex: 1; }
    label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.8rem; color: #6e5544; }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dcd5c9;
      border-radius: 6px;
      font-size: 0.9rem;
      background-color: #faf8f5;
      color: #3e3332;
      transition: all 0.2s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #7a5c43;
      background-color: #ffffff;
      box-shadow: 0 0 0 2px rgba(122, 92, 67, 0.1);
    }
    
    .btn-box { display: flex; gap: 10px; margin-top: 8px; }
    button.btn-add {
      flex: 1;
      padding: 12px;
      background: linear-gradient(135deg, #7a5c43 0%, #543c29 100%);
      color: #faf8f5;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(84, 60, 41, 0.2);
    }
    button.btn-cancel {
      padding: 12px 16px;
      background: #8e857e;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      display: none;
    }

    /* カレンダー */
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .calendar-header h2 { font-size: 1rem; margin: 0; color: #543c29; font-weight: 600; letter-spacing: 0.05em; }
    .calendar-header button {
      background: #f2ece4;
      border: 1px solid #dcd5c9;
      color: #543c29;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
    .day-header { font-weight: 600; font-size: 0.72rem; color: #a09285; padding: 4px 0; }
    .day-cell {
      background: #faf8f5;
      border-radius: 6px;
      padding: 6px 2px;
      min-height: 50px;
      font-size: 0.85rem;
      cursor: pointer;
      position: relative;
      border: 1px solid #eee8df;
      color: #3e3332;
    }
    .day-cell:hover { background: #f2ece4; }
    .day-cell.selected { border: 1.5px solid #7a5c43; background: #ebdcd0; font-weight: bold; }
    .day-cell.today { color: #7a5c43; font-weight: bold; }
    .dot-container { display: flex; justify-content: center; gap: 3px; margin-top: 4px; flex-wrap: wrap; }
    .dot { width: 5px; height: 5px; border-radius: 50%; }

    /* ナチュラル・スタイリッシュ カテゴリーカラー */
    .cat-shinkansen { background-color: #2b4c7e; color: white; } /* 新幹線: ダークネイビー */
    .cat-airplane { background-color: #4a86a8; color: white; }   /* 飛行機: スカイブルー */
    .cat-meeting { background-color: #b86b4b; color: white; }    /* 会議: テラコッタ */
    .cat-trip { background-color: #5a7d65; color: white; }       /* 出張・施工: ディープグリーン */
    .cat-private { background-color: #c0933e; color: white; }    /* プライベート: アンティークゴールド */
    .cat-other { background-color: #8e857e; color: white; }      /* その他: ウォームグレー */

    /* 予定一覧 */
    .list-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 14px; color: #543c29; display: flex; justify-content: space-between; align-items: center; }
    .schedule-item {
      background: #faf8f5;
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border: 1px solid #e5dfd5;
      border-left: 5px solid #8e857e;
    }
    .schedule-info { flex-grow: 1; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-right: 6px; font-weight: 600; }
    .schedule-time { font-size: 0.8rem; color: #7e7167; font-weight: 600; }
    .schedule-title { font-size: 0.95rem; font-weight: 600; margin: 4px 0; color: #2c2221; }
    .schedule-memo { font-size: 0.82rem; color: #6e635a; white-space: pre-wrap; margin-top: 4px; line-height: 1.4; }
    .action-btns { display: flex; gap: 6px; }
    .btn-edit { background: #6e8396; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; }
    .btn-del { background: #a85252; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header-banner">
    <h1>WOODWORK SCHEDULE</h1>
  </div>

  <!-- 予定入力フォーム -->
  <div class="card">
    <input type="hidden" id="editId" value="">
    
    <div class="form-row">
      <div class="form-group">
        <label>開始日</label>
        <input type="date" id="startDate" onchange="syncEndDate()">
      </div>
      <div class="form-group">
        <label>終了日</label>
        <input type="date" id="endDate">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>開始時間</label>
        <input type="time" id="startTime">
      </div>
      <div class="form-group">
        <label>終了時間</label>
        <input type="time" id="endTime">
      </div>
    </div>

    <div class="form-group">
      <label>カテゴリー</label>
      <select id="category">
        <option value="shinkansen">新幹線</option>
        <option value="airplane">飛行機</option>
        <option value="meeting">会議</option>
        <option value="trip">出張・施工</option>
        <option value="private">プライベート</option>
        <option value="other">その他</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>タイトル</label>
      <input type="text" id="title" placeholder="例：〇〇邸 納品・施工">
    </div>

    <div class="form-group">
      <label>メモ</label>
      <textarea id="memo" rows="2" placeholder="場所や座席番号、持参物など"></textarea>
    </div>

    <div class="btn-box">
      <button class="btn-add" id="btnSubmit" onclick="addOrUpdateSchedule()">予定を追加する</button>
      <button class="btn-cancel" id="btnCancel" onclick="resetForm()">キャンセル</button>
    </div>
  </div>

  <!-- 月間カレンダー -->
  <div class="card">
    <div class="calendar-header">
      <button onclick="changeMonth(-1)">◀ 前月</button>
      <h2 id="calendar-month-year"></h2>
      <button onclick="changeMonth(1)">次月 ▶</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>

  <!-- 予定一覧 -->
  <div class="card">
    <div class="list-title">
      <span id="selected-date-display">予定一覧</span>
      <button onclick="showAllSchedules()" style="font-size:0.75rem; padding: 4px 10px; cursor:pointer; background:#f2ece4; border:1px solid #dcd5c9; border-radius:4px; color:#543c29; font-weight:600;">全表示</button>
    </div>
    <div id="schedule-list"></div>
  </div>

  <script>
    let currentDisplayDate = new Date();
    let selectedDateStr = new Date().toISOString().split('T')[0];

    const categoryNames = { 
      shinkansen: "新幹線", 
      airplane: "飛行機", 
      meeting: "会議", 
      trip: "出張・施工", 
      private: "プライベート", 
      other: "その他" 
    };

    const categoryColors = { 
      shinkansen: "#2b4c7e", 
      airplane: "#4a86a8", 
      meeting: "#b86b4b", 
      trip: "#5a7d65", 
      private: "#c0933e", 
      other: "#8e857e" 
    };

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("startDate").value = selectedDateStr;
      document.getElementById("endDate").value = selectedDateStr;
      renderCalendar();
      loadSchedules(selectedDateStr);
    });

    function syncEndDate() {
      const start = document.getElementById("startDate").value;
      const end = document.getElementById("endDate").value;
      if (!end || end < start) {
        document.getElementById("endDate").value = start;
      }
    }

    function addOrUpdateSchedule() {
      const editId = document.getElementById("editId").value;
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value || startDate;
      const startTime = document.getElementById("startTime").value;
      const endTime = document.getElementById("endTime").value;
      const title = document.getElementById("title").value;
      const category = document.getElementById("category").value;
      const memo = document.getElementById("memo").value;

      if (!startDate || !title) {
        alert("開始日とタイトルを入力してください");
        return;
      }

      if (endDate < startDate) {
        alert("終了日は開始日より後の日付を選択してください");
        return;
      }

      let schedules = getSchedules();

      if (editId) {
        schedules = schedules.map(item => {
          if (item.id === Number(editId)) {
            return { id: item.id, startDate, endDate, startTime, endTime, title, category, memo };
          }
          return item;
        });
      } else {
        const newSchedule = { id: Date.now(), startDate, endDate, startTime, endTime, title, category, memo };
        schedules.push(newSchedule);
      }

      schedules.sort((a, b) => (a.startDate + (a.startTime || "00:00")).localeCompare(b.startDate + (b.startTime || "00:00")));

      localStorage.setItem("my_schedules", JSON.stringify(schedules));

      resetForm();
      selectedDateStr = startDate;
      renderCalendar();
      loadSchedules(selectedDateStr);
    }

    function editSchedule(id) {
      const schedules = getSchedules();
      const item = schedules.find(s => s.id === id);
      if (!item) return;

      document.getElementById("editId").value = item.id;
      document.getElementById("startDate").value = item.startDate;
      document.getElementById("endDate").value = item.endDate || item.startDate;
      document.getElementById("startTime").value = item.startTime || "";
      document.getElementById("endTime").value = item.endTime || "";
      document.getElementById("category").value = item.category || "shinkansen";
      document.getElementById("title").value = item.title;
      document.getElementById("memo").value = item.memo || "";

      document.getElementById("btnSubmit").innerText = "予定を更新する";
      document.getElementById("btnCancel").style.display = "block";

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      document.getElementById("editId").value = "";
      document.getElementById("title").value = "";
      document.getElementById("memo").value = "";
      document.getElementById("startTime").value = "";
      document.getElementById("endTime").value = "";
      document.getElementById("btnSubmit").innerText = "予定を追加する";
      document.getElementById("btnCancel").style.display = "none";
    }

    function getSchedules() {
      const data = localStorage.getItem("my_schedules");
      return data ? JSON.parse(data) : [];
    }

    function renderCalendar() {
      const grid = document.getElementById("calendar-grid");
      grid.innerHTML = "";

      const year = currentDisplayDate.getFullYear();
      const month = currentDisplayDate.getMonth();

      document.getElementById("calendar-month-year").innerText = `${year}年 ${month + 1}月`;

      const days = ["日", "月", "火", "水", "木", "金", "土"];
      days.forEach(d => {
        const h = document.createElement("div");
        h.className = "day-header";
        h.innerText = d;
        grid.appendChild(h);
      });

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();
      const schedules = getSchedules();

      for (let i = 0; i < firstDay; i++) {
        grid.appendChild(document.createElement("div"));
      }

      const todayStr = new Date().toISOString().split('T')[0];

      for (let d = 1; d <= lastDate; d++) {
        const cell = document.createElement("div");
        const monthFormatted = String(month + 1).padStart(2, '0');
        const dayFormatted = String(d).padStart(2, '0');
        const dateStr = `${year}-${monthFormatted}-${dayFormatted}`;

        cell.className = "day-cell";
        if (dateStr === todayStr) cell.classList.add("today");
        if (dateStr === selectedDateStr) cell.classList.add("selected");

        cell.innerHTML = `<div>${d}</div>`;

        const daySchedules = schedules.filter(s => dateStr >= s.startDate && dateStr <= (s.endDate || s.startDate));
        
        if (daySchedules.length > 0) {
          const dotBox = document.createElement("div");
          dotBox.className = "dot-container";
          daySchedules.slice(0, 3).forEach(s => {
            const dot = document.createElement("span");
            dot.className = "dot";
            dot.style.backgroundColor = categoryColors[s.category] || "#8e857e";
            dotBox.appendChild(dot);
          });
          cell.appendChild(dotBox);
        }

        cell.onclick = () => {
          selectedDateStr = dateStr;
          document.getElementById("startDate").value = dateStr;
          document.getElementById("endDate").value = dateStr;
          renderCalendar();
          loadSchedules(dateStr);
        };

        grid.appendChild(cell);
      }
    }

    function changeMonth(delta) {
      currentDisplayDate.setMonth(currentDisplayDate.getMonth() + delta);
      renderCalendar();
    }

    function loadSchedules(filterDate = null) {
      const listContainer = document.getElementById("schedule-list");
      listContainer.innerHTML = "";
      let schedules = getSchedules();

      const displayTitle = document.getElementById("selected-date-display");

      if (filterDate) {
        schedules = schedules.filter(s => filterDate >= s.startDate && filterDate <= (s.endDate || s.startDate));
        displayTitle.innerText = `📅 ${filterDate} の予定`;
      } else {
        displayTitle.innerText = `📅 すべての予定`;
      }

      if (schedules.length === 0) {
        listContainer.innerHTML = '<p style="text-align:center; color:#a09285; font-size:0.85rem; margin:12px 0;">予定はありません</p>';
        return;
      }

      schedules.forEach(item => {
        const div = document.createElement("div");
        div.className = "schedule-item";
        div.style.borderLeftColor = categoryColors[item.category] || "#8e857e";

        let timeRangeText = "";
        if (item.startTime) {
          timeRangeText = `⏰ ${item.startTime}` + (item.endTime ? `〜${item.endTime}` : "");
        }

        const dateRangeText = (item.endDate && item.endDate !== item.startDate) 
          ? `${item.startDate} 〜 ${item.endDate}` 
          : item.startDate;

        const catBadge = `<span class="badge cat-${item.category}">${categoryNames[item.category] || "その他"}</span>`;

        div.innerHTML = `
          <div class="schedule-info">
            <div>${catBadge} <span class="schedule-time">${dateRangeText} ${timeRangeText}</span></div>
            <div class="schedule-title">${item.title}</div>
            ${item.memo ? `<div class="schedule-memo">${item.memo}</div>` : ''}
          </div>
          <div class="action-btns">
            <button class="btn-edit" onclick="editSchedule(${item.id})">編集</button>
            <button class="btn-del" onclick="deleteSchedule(${item.id})">削除</button>
          </div>
        `;
        listContainer.appendChild(div);
      });
    }

    function showAllSchedules() {
      selectedDateStr = null;
      renderCalendar();
      loadSchedules(null);
    }

    function deleteSchedule(id) {
      if (!confirm("本当に削除しますか？")) return;
      let schedules = getSchedules();
      schedules = schedules.filter(item => item.id !== id);
      localStorage.setItem("my_schedules", JSON.stringify(schedules));
      renderCalendar();
      loadSchedules(selectedDateStr);
    }
  </script>
</body>
</html>
