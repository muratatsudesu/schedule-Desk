<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q.T.S-SCHEDULE</title>
  <style>
    * { box-sizing: border-box; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; }
    body {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px;
      background-color: #f6f4f0;
      color: #3e3332;
      letter-spacing: 0.02em;
    }
    
    /* ヘッダー */
    .header-banner {
      background: linear-gradient(135deg, #7a5c43 0%, #543c29 100%);
      color: #faf8f5;
      padding: 16px 12px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(84, 60, 41, 0.15);
      margin-bottom: 16px;
    }
    .header-banner h1 { margin: 0; font-size: 1.3rem; letter-spacing: 0.15em; font-weight: 600; text-transform: uppercase; }
    
    /* カードデザイン */
    .card {
      background: #ffffff;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 2px 10px rgba(62, 51, 50, 0.04);
      border: 1px solid #e5dfd5;
      margin-bottom: 16px;
    }
    
    .form-group { margin-bottom: 12px; }
    .form-row { display: flex; gap: 10px; }
    .form-row > div { flex: 1; }
    label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.82rem; color: #543c29; }
    input, select, textarea {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #dcd5c9;
      border-radius: 6px;
      font-size: 0.9rem;
      background-color: #faf8f5;
      color: #3e3332;
      transition: all 0.2s ease;
    }
    input:disabled { background-color: #eee; color: #aaa; }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #7a5c43;
      background-color: #ffffff;
      box-shadow: 0 0 0 2px rgba(122, 92, 67, 0.1);
    }
    
    /* 終日チェックボックス用のレイアウト */
    .all-day-box {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #543c29;
      cursor: pointer;
    }
    .all-day-box input[type="checkbox"] {
      width: auto;
      margin: 0;
      cursor: pointer;
    }

    .btn-box { display: flex; gap: 10px; margin-top: 8px; }
    button.btn-add {
      flex: 1;
      padding: 12px;
      background: linear-gradient(135deg, #7a5c43 0%, #543c29 100%);
      color: #faf8f5;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(84, 60, 41, 0.2);
    }
    button.btn-cancel {
      padding: 12px 16px;
      background: #8e857e;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      display: none;
    }

    /* カレンダー */
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .calendar-header h2 { font-size: 1.1rem; margin: 0; color: #543c29; font-weight: 600; }
    .calendar-header button {
      background: #f2ece4;
      border: 1px solid #dcd5c9;
      color: #543c29;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e5dfd5; border: 1px solid #e5dfd5; border-radius: 6px; overflow: hidden; }
    .day-header { background: #faf8f5; font-weight: 600; font-size: 0.75rem; color: #7a6b5d; padding: 6px 0; text-align: center; }
    
    .day-cell {
      background: #ffffff;
      min-height: 60px;
      font-size: 0.8rem;
      cursor: pointer;
      position: relative;
      color: #3e3332;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .day-cell:hover { background: #faf5ee; }
    .day-cell.selected { background: #fdf8f3; }
    .day-number { padding: 2px 4px; font-weight: 600; font-size: 0.75rem; }
    .day-cell.today .day-number { color: #0055ff; font-weight: bold; }
    
    /* イベントバー表示スタイル（スマホ崩れ防止調整） */
    .events-container { display: flex; flex-direction: column; gap: 2px; flex-grow: 1; padding-bottom: 2px; width: 100%; }
    .event-bar-wrapper { height: 18px; position: relative; width: 100%; }
    .event-bar {
      height: 18px;
      line-height: 18px;
      color: #ffffff !important; /* スマホでの白化防止 */
      font-size: 0.65rem;
      padding: 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: absolute;
      top: 0;
      z-index: 2;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      font-weight: 600;
      -webkit-text-fill-color: #ffffff; /* WebKit向け白文字保持 */
    }
    .event-bar.is-start { border-top-left-radius: 3px; border-bottom-left-radius: 3px; }
    .event-bar.is-end { border-top-right-radius: 3px; border-bottom-right-radius: 3px; }

    /* カテゴリーカラー */
    .cat-shinkansen { background-color: #0055ff !important; }
    .cat-airplane { background-color: #00aaff !important; }
    .cat-hiace { background-color: #d97706 !important; }
    .cat-office { background-color: #333333 !important; }
    .cat-holiday { background-color: #ff2200 !important; }
    .cat-meeting { background-color: #ff8800 !important; }
    .cat-trip { background-color: #00aa44 !important; }
    .cat-private { background-color: #aa00cc !important; }
    .cat-other { background-color: #885522 !important; }

    /* 予定一覧 */
    .list-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 12px; color: #543c29; display: flex; justify-content: space-between; align-items: center; }
    .schedule-item {
      background: #faf8f5;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border: 1px solid #e5dfd5;
      border-left: 5px solid #8e857e;
    }
    .schedule-info { flex-grow: 1; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; margin-right: 6px; font-weight: 600; color: white; }
    .schedule-time { font-size: 0.8rem; color: #555; font-weight: 600; }
    .schedule-title { font-size: 0.95rem; font-weight: 600; margin: 4px 0; color: #2c2221; }
    .schedule-memo { font-size: 0.82rem; color: #555; white-space: pre-wrap; margin-top: 4px; line-height: 1.4; }
    .action-btns { display: flex; gap: 6px; }
    .btn-edit { background: #557799; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; }
    .btn-del { background: #cc3333; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; }

    /* PC表示時の拡大設定 */
    @media (min-width: 768px) {
      .day-cell { min-height: 100px; }
      .event-bar { font-size: 0.78rem; height: 22px; line-height: 22px; padding: 0 6px; }
      .event-bar-wrapper { height: 22px; }
      .day-number { font-size: 0.85rem; padding: 4px 6px; }
    }
  </style>
</head>
<body>

  <div class="header-banner">
    <h1>Q.T.S-SCHEDULE</h1>
  </div>

  <!-- 予定入力フォーム -->
  <div class="card">
    <input type="hidden" id="editId" value="">
    
    <div class="form-row">
      <div class="form-group">
        <label>開始日</label>
        <input type="date" id="startDate" onchange="syncEndDate()">
      </div>
      <div class="form-group">
        <label>終了日</label>
        <input type="date" id="endDate">
      </div>
    </div>

    <!-- 終日設定チェックボックス -->
    <label class="all-day-box">
      <input type="checkbox" id="isAllDay" onchange="toggleAllDay()"> 終日
    </label>

    <div class="form-row" id="timeRow">
      <div class="form-group">
        <label>開始時間</label>
        <input type="time" id="startTime">
      </div>
      <div class="form-group">
        <label>終了時間</label>
        <input type="time" id="endTime">
      </div>
    </div>

    <div class="form-group">
      <label>カテゴリー</label>
      <select id="category">
        <option value="shinkansen">新幹線</option>
        <option value="airplane">飛行機</option>
        <option value="hiace">ハイエース</option>
        <option value="office">事務所</option>
        <option value="holiday">休み</option>
        <option value="meeting">会議</option>
        <option value="trip">出張・施工</option>
        <option value="private">プライベート</option>
        <option value="other">その他</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>タイトル</label>
      <input type="text" id="title" placeholder="例：〇〇邸 納品・施工">
    </div>

    <div class="form-group">
      <label>メモ</label>
      <textarea id="memo" rows="2" placeholder="場所や座席番号、持参物など"></textarea>
    </div>

    <div class="btn-box">
      <button class="btn-add" id="btnSubmit" onclick="addOrUpdateSchedule()">予定を追加する</button>
      <button class="btn-cancel" id="btnCancel" onclick="resetForm()">キャンセル</button>
    </div>
  </div>

  <!-- 月間カレンダー -->
  <div class="card">
    <div class="calendar-header">
      <button onclick="changeMonth(-1)">◀ 前月</button>
      <h2 id="calendar-month-year"></h2>
      <button onclick="changeMonth(1)">次月 ▶</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>

  <!-- 予定一覧 -->
  <div class="card">
    <div class="list-title">
      <span id="selected-date-display">予定一覧</span>
      <button onclick="showAllSchedules()" style="font-size:0.78rem; padding: 4px 10px; cursor:pointer; background:#f2ece4; border:1px solid #dcd5c9; border-radius:4px; color:#543c29; font-weight:600;">全表示</button>
    </div>
    <div id="schedule-list"></div>
  </div>

  <script>
    let currentDisplayDate = new Date();
    let selectedDateStr = new Date().toISOString().split('T')[0];

    const categoryNames = { 
      shinkansen: "新幹線", 
      airplane: "飛行機", 
      hiace: "ハイエース",
      office: "事務所", 
      holiday: "休み", 
      meeting: "会議", 
      trip: "出張・施工", 
      private: "プライベート", 
      other: "その他" 
    };

    const categoryColors = { 
      shinkansen: "#0055ff", 
      airplane: "#00aaff", 
      hiace: "#d97706",
      office: "#333333", 
      holiday: "#ff2200", 
      meeting: "#ff8800", 
      trip: "#00aa44", 
      private: "#aa00cc", 
      other: "#885522" 
    };

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("startDate").value = selectedDateStr;
      document.getElementById("endDate").value = selectedDateStr;
      renderCalendar();
      loadSchedules(selectedDateStr);
    });

    function toggleAllDay() {
      const isChecked = document.getElementById("isAllDay").checked;
      const startTimeInput = document.getElementById("startTime");
      const endTimeInput = document.getElementById("endTime");
      
      startTimeInput.disabled = isChecked;
      endTimeInput.disabled = isChecked;
      
      if (isChecked) {
        startTimeInput.value = "";
        endTimeInput.value = "";
      }
    }

    function syncEndDate() {
      const start = document.getElementById("startDate").value;
      const end = document.getElementById("endDate").value;
      if (!end || end < start) {
        document.getElementById("endDate").value = start;
      }
    }

    function addOrUpdateSchedule() {
      const editId = document.getElementById("editId").value;
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value || startDate;
      const isAllDay = document.getElementById("isAllDay").checked;
      const startTime = isAllDay ? "" : document.getElementById("startTime").value;
      const endTime = isAllDay ? "" : document.getElementById("endTime").value;
      const title = document.getElementById("title").value;
      const category = document.getElementById("category").value;
      const memo = document.getElementById("memo").value;

      if (!startDate || !title) {
        alert("開始日とタイトルを入力してください");
        return;
      }

      if (endDate < startDate) {
        alert("終了日は開始日より後の日付を選択してください");
        return;
      }

      let schedules = getSchedules();

      if (editId) {
        schedules = schedules.map(item => {
          if (item.id === Number(editId)) {
            return { id: item.id, startDate, endDate, isAllDay, startTime, endTime, title, category, memo };
          }
          return item;
        });
      } else {
        const newSchedule = { id: Date.now(), startDate, endDate, isAllDay, startTime, endTime, title, category, memo };
        schedules.push(newSchedule);
      }

      schedules.sort((a, b) => (a.startDate + (a.startTime || "00:00")).localeCompare(b.startDate + (b.startTime || "00:00")));

      localStorage.setItem("my_schedules", JSON.stringify(schedules));

      resetForm();
      selectedDateStr = startDate;
      renderCalendar();
      loadSchedules(selectedDateStr);
    }

    function editSchedule(id) {
      const schedules = getSchedules();
      const item = schedules.find(s => s.id === id);
      if (!item) return;

      document.getElementById("editId").value = item.id;
      document.getElementById("startDate").value = item.startDate;
      document.getElementById("endDate").value = item.endDate || item.startDate;
      
      const isAllDay = !!item.isAllDay;
      document.getElementById("isAllDay").checked = isAllDay;
      toggleAllDay();

      document.getElementById("startTime").value = item.startTime || "";
      document.getElementById("endTime").value = item.endTime || "";
      document.getElementById("category").value = item.category || "shinkansen";
      document.getElementById("title").value = item.title;
      document.getElementById("memo").value = item.memo || "";

      document.getElementById("btnSubmit").innerText = "予定を更新する";
      document.getElementById("btnCancel").style.display = "block";

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      document.getElementById("editId").value = "";
      document.getElementById("title").value = "";
      document.getElementById("memo").value = "";
      document.getElementById("isAllDay").checked = false;
      toggleAllDay();
      document.getElementById("startTime").value = "";
      document.getElementById("endTime").value = "";
      document.getElementById("btnSubmit").innerText = "予定を追加する";
      document.getElementById("btnCancel").style.display = "none";
    }

    function getSchedules() {
      const data = localStorage.getItem("my_schedules");
      return data ? JSON.parse(data) : [];
    }

    function renderCalendar() {
      const grid = document.getElementById("calendar-grid");
      grid.innerHTML = "";

      const year = currentDisplayDate.getFullYear();
      const month = currentDisplayDate.getMonth();

      document.getElementById("calendar-month-year").innerText = `${year}年 ${month + 1}月`;

      const days = ["日", "月", "火", "水", "木", "金", "土"];
      days.forEach(d => {
        const h = document.createElement("div");
        h.className = "day-header";
        h.innerText = d;
        grid.appendChild(h);
      });

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();
      const schedules = getSchedules();

      // 空白セル
      for (let i = 0; i < firstDay; i++) {
        const emptyCell = document.createElement("div");
        emptyCell.className = "day-cell";
        emptyCell.style.background = "#f7f5f0";
        grid.appendChild(emptyCell);
      }

      const todayStr = new Date().toISOString().split('T')[0];

      // イベントの縦位置レイアウト計算
      const daySlots = {};
      for (let d = 1; d <= lastDate; d++) {
        const monthFormatted = String(month + 1).padStart(2, '0');
        const dayFormatted = String(d).padStart(2, '0');
        daySlots[`${year}-${monthFormatted}-${dayFormatted}`] = [];
      }

      // 当月にかかるスケジュールを抽出
      const activeSchedules = schedules.filter(s => {
        const start = s.startDate;
        const end = s.endDate || s.startDate;
        const monthStart = `${year}-${String(month + 1).padStart(2, '0')}-01`;
        const monthEnd = `${year}-${String(month + 1).padStart(2, '0')}-${String(lastDate).padStart(2, '0')}`;
        return start <= monthEnd && end >= monthStart;
      });

      // スロット割り当て
      const scheduleSlots = {};
      activeSchedules.forEach(s => {
        let slot = 0;
        let available = false;
        while (!available) {
          available = true;
          for (let d = 1; d <= lastDate; d++) {
            const mStr = String(month + 1).padStart(2, '0');
            const dStr = String(d).padStart(2, '0');
            const dateStr = `${year}-${mStr}-${dStr}`;
            if (dateStr >= s.startDate && dateStr <= (s.endDate || s.startDate)) {
              if (daySlots[dateStr][slot]) {
                available = false;
                slot++;
                break;
              }
            }
          }
        }
        scheduleSlots[s.id] = slot;
        for (let d = 1; d <= lastDate; d++) {
          const mStr = String(month + 1).padStart(2, '0');
          const dStr = String(d).padStart(2, '0');
          const dateStr = `${year}-${mStr}-${dStr}`;
          if (dateStr >= s.startDate && dateStr <= (s.endDate || s.startDate)) {
            daySlots[dateStr][slot] = s.id;
          }
        }
      });

      // カレンダーマスの描画
      for (let d = 1; d <= lastDate; d++) {
        const cell = document.createElement("div");
        const monthFormatted = String(month + 1).padStart(2, '0');
        const dayFormatted = String(d).padStart(2, '0');
        const dateStr = `${year}-${monthFormatted}-${dayFormatted}`;
        const dayOfWeek = new Date(year, month, d).getDay();

        cell.className = "day-cell";
        if (dateStr === todayStr) cell.classList.add("today");
        if (dateStr === selectedDateStr) cell.classList.add("selected");

        const dayNum = document.createElement("div");
        dayNum.className = "day-number";
        dayNum.innerText = d;
        cell.appendChild(dayNum);

        const eventsContainer = document.createElement("div");
        eventsContainer.className = "events-container";

        const dayEvents = activeSchedules.filter(s => dateStr >= s.startDate && dateStr <= (s.endDate || s.startDate));
        const maxSlot = Math.max(-1, ...dayEvents.map(s => scheduleSlots[s.id]));

        for (let i = 0; i <= maxSlot; i++) {
          const wrapper = document.createElement("div");
          wrapper.className = "event-bar-wrapper";

          const targetEvent = dayEvents.find(s => scheduleSlots[s.id] === i);
          if (targetEvent) {
            const bar = document.createElement("div");
            bar.className = `event-bar cat-${targetEvent.category}`;
            
            const targetEnd = targetEvent.endDate || targetEvent.startDate;

            if (dateStr === targetEvent.startDate) bar.classList.add("is-start");
            if (dateStr === targetEnd) bar.classList.add("is-end");

            const isStart = dateStr === targetEvent.startDate || dayOfWeek === 0 || d === 1;

            if (isStart) {
              let spanDays = 0;
              let curr = new Date(year, month, d);
              while (true) {
                const currFormatted = `${curr.getFullYear()}-${String(curr.getMonth() + 1).padStart(2, '0')}-${String(curr.getDate()).padStart(2, '0')}`;
                if (currFormatted > targetEnd) break;
                
                spanDays++;
                if (curr.getDay() === 6 || curr.getDate() === lastDate) break;
                curr.setDate(curr.getDate() + 1);
              }
              bar.style.width = `calc(${spanDays * 100}% + ${(spanDays - 1) * 1}px)`;
              bar.innerText = targetEvent.title;
            } else {
              bar.style.opacity = "0";
              bar.style.pointerEvents = "none";
            }

            wrapper.appendChild(bar);
          }
          eventsContainer.appendChild(wrapper);
        }

        cell.appendChild(eventsContainer);

        cell.onclick = (e) => {
          selectedDateStr = dateStr;
          document.getElementById("startDate").value = dateStr;
          document.getElementById("endDate").value = dateStr;
          renderCalendar();
          loadSchedules(dateStr);
        };

        grid.appendChild(cell);
      }
    }

    function changeMonth(delta) {
      currentDisplayDate.setMonth(currentDisplayDate.getMonth() + delta);
      renderCalendar();
    }

    function loadSchedules(filterDate = null) {
      const listContainer = document.getElementById("schedule-list");
      listContainer.innerHTML = "";
      let schedules = getSchedules();

      const displayTitle = document.getElementById("selected-date-display");

      if (filterDate) {
        schedules = schedules.filter(s => filterDate >= s.startDate && filterDate <= (s.endDate || s.startDate));
        displayTitle.innerText = `📅 ${filterDate} の予定`;
      } else {
        displayTitle.innerText = `📅 すべての予定`;
      }

      if (schedules.length === 0) {
        listContainer.innerHTML = '<p style="text-align:center; color:#888; font-size:0.85rem; margin:15px 0;">予定はありません</p>';
        return;
      }

      schedules.forEach(item => {
        const div = document.createElement("div");
        div.className = "schedule-item";
        div.style.borderLeftColor = categoryColors[item.category] || "#8e857e";

        let timeRangeText = "☀️ 終日";
        if (!item.isAllDay && item.startTime) {
          timeRangeText = `⏰ ${item.startTime}` + (item.endTime ? `〜${item.endTime}` : "");
        }

        const dateRangeText = (item.endDate && item.endDate !== item.startDate) 
          ? `${item.startDate} 〜 ${item.endDate}` 
          : item.startDate;

        const catBadge = `<span class="badge cat-${item.category}" style="background-color:${categoryColors[item.category]}">${categoryNames[item.category] || "その他"}</span>`;

        div.innerHTML = `
          <div class="schedule-info">
            <div>${catBadge} <span class="schedule-time">${dateRangeText} ${timeRangeText}</span></div>
            <div class="schedule-title">${item.title}</div>
            ${item.memo ? `<div class="schedule-memo">${item.memo}</div>` : ''}
          </div>
          <div class="action-btns">
            <button class="btn-edit" onclick="editSchedule(${item.id})">編集</button>
            <button class="btn-del" onclick="deleteSchedule(${item.id})">削除</button>
          </div>
        `;
        listContainer.appendChild(div);
      });
    }

    function showAllSchedules() {
      selectedDateStr = null;
      renderCalendar();
      loadSchedules(null);
    }

    function deleteSchedule(id) {
      if (!confirm("本当に削除しますか？")) return;
      let schedules = getSchedules();
      schedules = schedules.filter(item => item.id !== id);
      localStorage.setItem("my_schedules", JSON.stringify(schedules));
      renderCalendar();
      loadSchedules(selectedDateStr);
    }
  </script>
