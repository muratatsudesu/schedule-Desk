<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>木質調 スケジュール管理</title>
  <style>
    * { box-sizing: border-box; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; }
    body {
      max-width: 600px;
      margin: 0 auto;
      padding: 15px;
      background-color: #f7f5f0; /* 温かみのあるサンドベージュ */
      color: #4a3e3d;
    }
    
    /* タイトルヘッダー（木調グラデーション） */
    .header-banner {
      background: linear-gradient(135deg, #8c6d53 0%, #6e5038 100%);
      color: #fff;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(110, 80, 56, 0.2);
      margin-bottom: 20px;
    }
    .header-banner h1 { margin: 0; font-size: 1.3rem; letter-spacing: 0.05em; font-weight: 500; }
    
    /* カードデザイン */
    .card {
      background: #ffffff;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(74, 62, 61, 0.05);
      border: 1px solid #e8e2d5;
      margin-bottom: 20px;
    }
    
    .form-group { margin-bottom: 12px; }
    .form-row { display: flex; gap: 10px; }
    .form-row > div { flex: 1; }
    label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.82rem; color: #6e5038; }
    input, select, textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d4cbbe;
      border-radius: 6px;
      font-size: 0.9rem;
      background-color: #faf9f6;
      color: #4a3e3d;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #8c6d53;
      background-color: #fff;
    }
    
    /* 木調ボタン */
    button.btn-add {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #8c6d53 0%, #6e5038 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
      transition: opacity 0.2s;
    }
    button.btn-add:hover { opacity: 0.9; }

    /* カレンダー スタイル */
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .calendar-header h2 { font-size: 1.05rem; margin: 0; color: #5c4331; font-weight: 600; }
    .calendar-header button {
      background: #f0eae1;
      border: 1px solid #d4cbbe;
      color: #5c4331;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
    .day-header { font-weight: 600; font-size: 0.75rem; color: #9c8a79; padding: 4px 0; }
    .day-cell {
      background: #faf9f6;
      border-radius: 6px;
      padding: 6px 2px;
      min-height: 48px;
      font-size: 0.85rem;
      cursor: pointer;
      position: relative;
      border: 1px solid #f0eae1;
      color: #4a3e3d;
    }
    .day-cell:hover { background: #f0eae1; }
    .day-cell.selected { border: 1.5px solid #8c6d53; background: #f2ede4; font-weight: bold; }
    .day-cell.today { color: #8c6d53; font-weight: bold; }
    .dot-container { display: flex; justify-content: center; gap: 2px; margin-top: 4px; flex-wrap: wrap; }
    .dot { width: 5px; height: 5px; border-radius: 50%; }

    /* ナチュラル・インテリア風 カテゴリーカラー */
    .cat-work { background-color: #5a738e; color: white; }    /* 仕事: アッシュブルー */
    .cat-meeting { background-color: #b87355; color: white; } /* 会議: テラコッタ */
    .cat-trip { background-color: #6b8e78; color: white; }    /* 出張: セージグリーン */
    .cat-private { background-color: #c49a45; color: white; } /* プライベート: マスタード */
    .cat-other { background-color: #8c827a; color: white; }   /* その他: ウォームグレー */

    /* 予定一覧リスト */
    .list-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 12px; color: #5c4331; display: flex; justify-content: space-between; align-items: center; }
    .schedule-item {
      background: #faf9f6;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border: 1px solid #ebd3c8;
      border-left: 5px solid #8c827a;
    }
    .schedule-info { flex-grow: 1; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; margin-right: 6px; font-weight: 600; }
    .schedule-time { font-size: 0.82rem; color: #7a6b5d; font-weight: 600; }
    .schedule-title { font-size: 0.95rem; font-weight: 600; margin: 4px 0; color: #3d3130; }
    .schedule-memo { font-size: 0.82rem; color: #6e6156; white-space: pre-wrap; margin-top: 2px; }
    .btn-del { background: #b85555; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header-banner">
    <h1>WOODWORK SCHEDULE</h1>
  </div>

  <!-- 予定入力フォーム -->
  <div class="card">
    <div class="form-row">
      <div class="form-group">
        <label>開始日</label>
        <input type="date" id="startDate" onchange="syncEndDate()">
      </div>
      <div class="form-group">
        <label>終了日</label>
        <input type="date" id="endDate">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>時間</label>
        <input type="time" id="time">
      </div>
      <div class="form-group">
        <label>カテゴリー</label>
        <select id="category">
          <option value="work">仕事</option>
          <option value="meeting">会議</option>
          <option value="trip">出張・施工</option>
          <option value="private">プライベート</option>
          <option value="other">その他</option>
        </select>
      </div>
    </div>
    
    <div class="form-group">
      <label>タイトル</label>
      <input type="text" id="title" placeholder="例：〇〇邸 納品・施工">
    </div>

    <div class="form-group">
      <label>メモ</label>
      <textarea id="memo" rows="2" placeholder="場所や持参物など"></textarea>
    </div>
    <button class="btn-add" onclick="addSchedule()">予定を追加する</button>
  </div>

  <!-- 月間カレンダー -->
  <div class="card">
    <div class="calendar-header">
      <button onclick="changeMonth(-1)">◀ 前月</button>
      <h2 id="calendar-month-year"></h2>
      <button onclick="changeMonth(1)">次月 ▶</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>

  <!-- 選択した日の予定一覧 -->
  <div class="card">
    <div class="list-title">
      <span id="selected-date-display">予定一覧</span>
      <button onclick="showAllSchedules()" style="font-size:0.75rem; padding: 3px 8px; cursor:pointer; background:#f0eae1; border:1px solid #d4cbbe; border-radius:4px; color:#5c4331;">全表示</button>
    </div>
    <div id="schedule-list"></div>
  </div>

  <script>
    let currentDisplayDate = new Date();
    let selectedDateStr = new Date().toISOString().split('T')[0];

    const categoryNames = { work: "仕事", meeting: "会議", trip: "出張・施工", private: "プライベート", other: "その他" };
    const categoryColors = { work: "#5a738e", meeting: "#b87355", trip: "#6b8e78", private: "#c49a45", other: "#8c827a" };

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("startDate").value = selectedDateStr;
      document.getElementById("endDate").value = selectedDateStr;
      renderCalendar();
      loadSchedules(selectedDateStr);
    });

    // 開始日を変えたら終了日も自動で合わせる
    function syncEndDate() {
      const start = document.getElementById("startDate").value;
      const end = document.getElementById("endDate").value;
      if (!end || end < start) {
        document.getElementById("endDate").value = start;
      }
    }

    function addSchedule() {
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value || startDate;
      const time = document.getElementById("time").value;
      const title = document.getElementById("title").value;
      const category = document.getElementById("category").value;
      const memo = document.getElementById("memo").value;

      if (!startDate || !title) {
        alert("開始日とタイトルを入力してください");
        return;
      }

      if (endDate < startDate) {
        alert("終了日は開始日より後の日付を選択してください");
        return;
      }

      const newSchedule = { id: Date.now(), startDate, endDate, time, title, category, memo };
      const schedules = getSchedules();
      schedules.push(newSchedule);
      
      // ソート
      schedules.sort((a, b) => (a.startDate + (a.time || "00:00")).localeCompare(b.startDate + (b.time || "00:00")));

      localStorage.setItem("my_schedules", JSON.stringify(schedules));

      document.getElementById("title").value = "";
      document.getElementById("memo").value = "";

      selectedDateStr = startDate;
      renderCalendar();
      loadSchedules(selectedDateStr);
    }

    function getSchedules() {
      const data = localStorage.getItem("my_schedules");
      return data ? JSON.parse(data) : [];
    }

    function renderCalendar() {
      const grid = document.getElementById("calendar-grid");
      grid.innerHTML = "";

      const year = currentDisplayDate.getFullYear();
      const month = currentDisplayDate.getMonth();

      document.getElementById("calendar-month-year").innerText = `${year}年 ${month + 1}月`;

      const days = ["日", "月", "火", "水", "木", "金", "土"];
      days.forEach(d => {
        const h = document.createElement("div");
        h.className = "day-header";
        h.innerText = d;
        grid.appendChild(h);
      });

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();
      const schedules = getSchedules();

      for (let i = 0; i < firstDay; i++) {
        grid.appendChild(document.createElement("div"));
      }

      const todayStr = new Date().toISOString().split('T')[0];

      for (let d = 1; d <= lastDate; d++) {
        const cell = document.createElement("div");
        const monthFormatted = String(month + 1).padStart(2, '0');
        const dayFormatted = String(d).padStart(2, '0');
        const dateStr = `${year}-${monthFormatted}-${dayFormatted}`;

        cell.className = "day-cell";
        if (dateStr === todayStr) cell.classList.add("today");
        if (dateStr === selectedDateStr) cell.classList.add("selected");

        cell.innerHTML = `<div>${d}</div>`;

        // 期間内に含まれる予定を取得
        const daySchedules = schedules.filter(s => dateStr >= s.startDate && dateStr <= (s.endDate || s.startDate));
        
        if (daySchedules.length > 0) {
          const dotBox = document.createElement("div");
          dotBox.className = "dot-container";
          daySchedules.slice(0, 3).forEach(s => {
            const dot = document.createElement("span");
            dot.className = "dot";
            dot.style.backgroundColor = categoryColors[s.category] || "#8c827a";
            dotBox.appendChild(dot);
          });
          cell.appendChild(dotBox);
        }

        cell.onclick = () => {
          selectedDateStr = dateStr;
          document.getElementById("startDate").value = dateStr;
          document.getElementById("endDate").value = dateStr;
          renderCalendar();
          loadSchedules(dateStr);
        };

        grid.appendChild(cell);
      }
    }

    function changeMonth(delta) {
      currentDisplayDate.setMonth(currentDisplayDate.getMonth() + delta);
      renderCalendar();
    }

    function loadSchedules(filterDate = null) {
      const listContainer = document.getElementById("schedule-list");
      listContainer.innerHTML = "";
      let schedules = getSchedules();

      const displayTitle = document.getElementById("selected-date-display");

      if (filterDate) {
        schedules = schedules.filter(s => filterDate >= s.startDate && filterDate <= (s.endDate || s.startDate));
        displayTitle.innerText = `📅 ${filterDate} の予定`;
      } else {
        displayTitle.innerText = `📅 すべての予定`;
      }

      if (schedules.length === 0) {
        listContainer.innerHTML = '<p style="text-align:center; color:#9c8a79; font-size:0.85rem; margin:10px 0;">予定はありません</p>';
        return;
      }

      schedules.forEach(item => {
        const div = document.createElement("div");
        div.className = "schedule-item";
        div.style.borderLeftColor = categoryColors[item.category] || "#8c827a";

        const timeText = item.time ? `⏰ ${item.time}` : "";
        const dateRangeText = (item.endDate && item.endDate !== item.startDate) 
          ? `${item.startDate} 〜 ${item.endDate}` 
          : item.startDate;

        const catBadge = `<span class="badge cat-${item.category}">${categoryNames[item.category] || "その他"}</span>`;

        div.innerHTML = `
          <div class="schedule-info">
            <div>${catBadge} <span class="schedule-time">${dateRangeText} ${timeText}</span></div>
            <div class="schedule-title">${item.title}</div>
            ${item.memo ? `<div class="schedule-memo">${item.memo}</div>` : ''}
          </div>
          <button class="btn-del" onclick="deleteSchedule(${item.id})">削除</button>
        `;
        listContainer.appendChild(div);
      });
    }

    function showAllSchedules() {
      selectedDateStr = null;
      renderCalendar();
      loadSchedules(null);
    }

    function deleteSchedule(id) {
      let schedules = getSchedules();
      schedules = schedules.filter(item => item.id !== id);
      localStorage.setItem("my_schedules", JSON.stringify(schedules));
      renderCalendar();
      loadSchedules(selectedDateStr);
    }
  </script>
</body>
</html>
